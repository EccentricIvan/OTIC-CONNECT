name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Verify Flutter setup
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK (split per ABI)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: flutter build apk --release --split-per-abi --android-skip-build-dependency-validation 

      - name: Upload arm64 APK (main target)
        uses: actions/upload-artifact@v4
        with:
          name: africa-ai-connect-v${{ github.run_number }}-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi APK (older devices)
        uses: actions/upload-artifact@v4
        with:
          name: africa-ai-connect-v${{ github.run_number }}-arm32
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
