name: otic_connect
description: Africa AI Connect - Empowering Women Through Digital Inclusion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation + State
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1

  # Networking (online layer)
  http: ^1.2.0

  # Local storage
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # User preferences
  shared_preferences: ^2.2.3

  # PDF certificate generation
  pdf: ^3.10.8

  # Connectivity detection
  connectivity_plus: ^6.0.0

  # URL launcher (for external links)
  url_launcher: ^6.2.0

  # File/image picking (marketplace listing photos) — file_picker over
  # image_picker because it has real Windows desktop support, and this
  # app is actively developed/tested on Windows, not just Android.
  file_picker: ^8.0.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/Africa-AI-Connect-logo.png"
  adaptive_icon_background: "#FAF1EC"
  adaptive_icon_foreground: "assets/branding/app_icon_mark.png"

flutter:
  uses-material-design: true

  assets:
    - assets/branding/
    - assets/curriculum/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Saira
      fonts:
        - asset: assets/fonts/Saira-Variable.ttf
          weight: 400
        - asset: assets/fonts/Saira-Variable.ttf
          weight: 500
        - asset: assets/fonts/Saira-Variable.ttf
          weight: 600
        - asset: assets/fonts/Saira-Variable.ttf
          weight: 700
